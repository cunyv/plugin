<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#356AB0"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A8D8FF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <!-- 圆角背景 -->
  <rect width="40" height="40" rx="8" fill="url(#bg)"/>

  <!-- 字母 A 主体 -->
  <path d="M20 8 L12 32 H15.5 L17.5 27 H22.5 L24.5 32 H28 L20 8Z M18 23 L20 15 L22 23H18Z"
        fill="white" opacity="0.95"/>

  <!-- 导航箭头：从 A 的顶端向右上飞出 -->
  <path d="M22.5 7 L31 7 L27 12" stroke="url(#arrow)" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
